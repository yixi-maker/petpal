services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgresql://petpal:petpal@db:5432/petpal
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      # Uncomment for real providers:
      # - SMS_PROVIDER=aliyun
      # - SMS_ACCESS_KEY=${SMS_ACCESS_KEY}
      # - SMS_SECRET=${SMS_SECRET}
      # - SMS_SIGN_NAME=${SMS_SIGN_NAME}
      # - SMS_TEMPLATE_ID=${SMS_TEMPLATE_ID}
      # - AI_PROVIDER=openai
      # - AI_API_KEY=${AI_API_KEY}
      # - AI_MODEL=${AI_MODEL}
      # - NEXT_PUBLIC_AMAP_KEY=${NEXT_PUBLIC_AMAP_KEY}
      # - STORAGE_PROVIDER=s3
      # - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      # - STORAGE_BUCKET=${STORAGE_BUCKET}
      # - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      # - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      # - MODERATION_API_KEY=${MODERATION_API_KEY}
      # - CODE_STORE=redis
      # - RATE_LIMIT_STORE=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: petpal
      POSTGRES_PASSWORD: petpal
      POSTGRES_DB: petpal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petpal"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
