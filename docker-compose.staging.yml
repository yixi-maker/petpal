services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=production
      - APP_ENV=staging
      - DATABASE_URL=postgresql://petpal:petpal@db:5432/petpal
      - REDIS_URL=redis://redis:6379
      - CODE_STORE=redis
      - RATE_LIMIT_STORE=redis
      # SMS_PROVIDER, SMS_ACCESS_KEY, SMS_SECRET, etc. are loaded from .env.staging
      # AI_PROVIDER, AI_API_KEY, AI_MODEL are loaded from .env.staging
      # STORAGE_PROVIDER, STORAGE_* are loaded from .env.staging
      # MODERATION_PROVIDER, MODERATION_API_KEY are loaded from .env.staging
      # NEXT_PUBLIC_AMAP_KEY is loaded from .env.staging
      # SESSION_SECRET, ADMIN_SESSION_SECRET, ADMIN_USERNAME, ADMIN_PASSWORD_HASH loaded from .env.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: m.daocloud.io/docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: petpal
      POSTGRES_PASSWORD: petpal
      POSTGRES_DB: petpal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petpal"]
      interval: 5s
      retries: 5

  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
