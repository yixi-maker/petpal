<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#FFFBF5"/>
  <!-- Main paw pad -->
  <ellipse cx="256" cy="340" rx="90" ry="80" fill="#f97316"/>
  <!-- Toe 1 (far left) -->
  <ellipse cx="140" cy="200" rx="50" ry="55" fill="#f97316" transform="rotate(-15, 140, 200)"/>
  <!-- Toe 2 (inner left) -->
  <ellipse cx="195" cy="150" rx="48" ry="52" fill="#f97316" transform="rotate(-5, 195, 150)"/>
  <!-- Toe 3 (inner right) -->
  <ellipse cx="317" cy="150" rx="48" ry="52" fill="#f97316" transform="rotate(5, 317, 150)"/>
  <!-- Toe 4 (far right) -->
  <ellipse cx="372" cy="200" rx="50" ry="55" fill="#f97316" transform="rotate(15, 372, 200)"/>
  <!-- Inner pad highlight -->
  <ellipse cx="256" cy="345" rx="55" ry="50" fill="#ea580c" opacity="0.3"/>
</svg>
